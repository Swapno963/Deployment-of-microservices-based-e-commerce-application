# payment-service-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: microservices-lab
  labels:
    app: payment-service
spec:
  replicas: 2  # Running 2 instances for high availability
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: swapno/payment-service:v1  # Replace with your image
        ports:
        - containerPort: 5001
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: microservices-lab
spec:
  selector:
    app: payment-service
  ports:
  - protocol: TCP
    port: 5001      # Service port
    targetPort: 5001 # Container port
  type: ClusterIP   # Internal service only
